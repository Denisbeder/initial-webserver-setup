---

- name: Check if certificate already exists
  stat:
    path: /etc/letsencrypt/live/{{ item }}/fullchain.pem
  become: true
  register: letsencrypt_cert
  loop: "{{ domains }}"

- name: Generate certificate
  shell: "certbot certonly -d {{ item.split() | join(' -d ') }} --email {{ email }} {{ certbot_extra_args }}"
  become: true
  loop: "{{ domains }}"
  when: not letsencrypt_cert.stat.exists

- name: Setup renew hook
  lineinfile:
    dest: "/etc/letsencrypt/renewal/{{ item }}.conf"
    insertafter: "^server ="
    line: "renew_hook = {{ renew_hook }}"
    state: present
  become: true
  loop: "{{ domains }}"
  when: not letsencrypt_cert.stat.exists
