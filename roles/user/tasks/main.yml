---

- name: Make sure we have a 'wheel' group
  group:
    name: wheel
    state: present
  become: true

- name: Allow 'wheel' group to have passwordless sudo
  lineinfile:
    path: /etc/sudoers
    state: present
    regexp: '^%wheel'
    line: '%wheel ALL=(ALL) NOPASSWD: ALL'
    validate: '/usr/sbin/visudo -cf %s'
  become: true

- name: Create a new regular user with sudo privileges
  user:
    name: "{{ user }}"
    #password: "{{ password }}"
    state: present
    groups: wheel
    append: true
    create_home: true
    shell: /bin/bash
  become: true

- name: Add user to www-data group
  user:
    name: "{{ user }}"
    groups: www-data
    append: yes

- name: Read root authorized_keys
  become: true
  slurp:
    src: /root/.ssh/authorized_keys
  register: root_keys

- name: Add root keys to new user "{{ user }}"
  become: true
  authorized_key:
    user: "{{ user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ (root_keys.content | b64decode).splitlines() }}"
